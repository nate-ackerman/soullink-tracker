name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build & package
        run: npx electron-vite build && npx electron-builder --win --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build & package (Apple Silicon)
        run: npx electron-vite build && npx electron-builder --mac --arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS ARM64 installer
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg

  build-macos-intel:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build & package (Intel)
        run: npx electron-vite build && npx electron-builder --mac --x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload macOS x64 installer
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.dmg
